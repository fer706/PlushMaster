<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>PlushMaster</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.postimg.cc/3rZTK3HP/plush-master-logo.png">
</head>

   <style>
  body {
    background-color: #001F3F;
  }
</style>


<div id="intro">

  <img src="https://i.postimg.cc/3rZTK3HP/plush-master-logo.png" alt="Logo do Site">
  <div id="carregando-texto">Carregando...</div>
</div>

<style>
  body {
    margin: 0;
    background-color: #001F3F;
    overflow: hidden;
  }

  #intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #001F3F;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #00BFFF;
    font-family: 'Orbitron', sans-serif;
  }

  #intro img {
    width: 100px;
    opacity: 0;
    animation: logoZoom 4s ease-in-out forwards;
  }

  #carregando-texto {
    font-size: 1.2em;
    opacity: 0;
    margin-top: 20px;
    animation: aparecerTexto 1s ease-in-out 3s forwards;
  }

  @keyframes logoZoom {
    0% { transform: scale(0.1); opacity: 0; }
    30% { opacity: 1; }
    60% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
  }

  @keyframes aparecerTexto {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>

<script>
  // Faz a intro sumir depois de 4 segundos
  setTimeout(() => {
    const intro = document.getElementById("intro");
    intro.style.opacity = "0";
    intro.style.transition = "opacity 1s";
    
    // Depois de 1s (transição), esconde a intro e mostra o login
    setTimeout(() => {
      intro.style.display = "none";
      const login = document.getElementById("loginContainer");
      if (login) login.style.display = "flex"; // Mostra a tela de login
    }, 1000);
  }, 4000);
</script>
<!-- 🔔 Contêiner das notificações -->
<div id="notificacoes"></div>

<style>
  /* ===============================
     🔵 ESTILO DAS NOTIFICAÇÕES
  =================================*/
  #notificacoes {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .notificacao {
    background: rgba(0, 20, 50, 0.95);
    border: 1px solid #00bfff;
    box-shadow: 0 0 15px #00bfff;
    color: #00bfff;
    font-family: 'Orbitron', sans-serif;
    padding: 15px 20px;
    border-radius: 10px;
    min-width: 250px;
    opacity: 0;
    transform: translateX(100%);
    animation: slideIn 0.5s forwards;
  }

  .notificacao.sucesso {
    border-color: #00ffcc;
    box-shadow: 0 0 20px #00ffcc;
    color: #00ffcc;
  }

  .notificacao.erro {
    border-color: #ff0033;
    box-shadow: 0 0 20px #ff0033;
    color: #ff0033;
  }

  .notificacao.info {
    border-color: #00bfff;
    box-shadow: 0 0 20px #00bfff;
  }

  @keyframes slideIn {
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  @keyframes slideOut {
    to {
      opacity: 0;
      transform: translateX(100%);
    }
  }
</style>

<script>
  // ===============================
  // 🚀 FUNÇÃO PARA MOSTRAR NOTIFICAÇÃO
  // ===============================
  function mostrarNotificacao(texto, tipo = "info") {
    const container = document.getElementById("notificacoes");

    const notif = document.createElement("div");
    notif.classList.add("notificacao", tipo);
    notif.textContent = texto;
    container.appendChild(notif);

    // Remove automaticamente depois de 4 segundos
    setTimeout(() => {
      notif.style.animation = "slideOut 0.5s forwards";
      setTimeout(() => notif.remove(), 500);
    }, 4000);
  }

  // 💡 Exemplo de uso:
  // mostrarNotificacao("Bem-vindo ao PlushMaster!", "sucesso");
  // mostrarNotificacao("Erro ao conectar ao servidor!", "erro");
</script>

<!-- 🔒 LOGIN + CADASTRO FUTURISTA -->
<div id="loginContainer">
  <div class="login-box">
    <h2>Login</h2>
    <input type="email" id="emailLogin" placeholder="Email" required>
    <input type="password" id="senhaLogin" placeholder="Senha" required>
    <button id="loginBtn">Entrar</button>
    <p>Não tem conta? <a href="#" id="mostrarCadastro">Cadastre-se</a></p>
  </div>
</div>

<div id="cadastroContainer">
  <div class="login-box">
    <h2>Criar Conta</h2>
    <input type="email" id="emailCadastro" placeholder="Email" required>
    <input type="password" id="senhaCadastro" placeholder="Senha" required>
    <button id="cadastroBtn">Cadastrar</button>
    <p>Já tem conta? <a href="#" id="mostrarLogin">Voltar ao login</a></p>
  </div>
</div>

  .login-box input::placeholder {

  }

    color: #000;

    cursor: pointer;
    font-size: 16px;

  }

  .login-box button:hover {

    box-shadow: 0 0 20px #00bfff;
  }

  .login-box p {
  margin-top: 15px;
  color: #ffffff; /* texto branco visível */
  font-size: 14px;
}

  color: #00bfff; /* azul neon */

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "SUA_API_KEY_AQUI",
    authDomain: "SEU_PROJETO.firebaseapp.com",
    projectId: "SEU_PROJETO",
    storageBucket: "SEU_PROJETO.appspot.com",
    messagingSenderId: "SEU_ID",
    appId: "SUA_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  function mostrarNotificacao(texto, tipo = "info") {
    const container = document.getElementById("notificacoes");
    const notif = document.createElement("div");
    notif.classList.add("notificacao", tipo);
    notif.textContent = texto;
    container.appendChild(notif);
    setTimeout(() => {
      notif.style.animation = "slideOut 0.5s forwards";
      setTimeout(() => notif.remove(), 500);
    }, 4000);
  }

  const loginContainer = document.getElementById("loginContainer");
  const cadastroContainer = document.getElementById("cadastroContainer");
  const mostrarCadastro = document.getElementById("mostrarCadastro");
  const mostrarLogin = document.getElementById("mostrarLogin");

  mostrarCadastro.addEventListener("click", (e) => {
    e.preventDefault();
    loginContainer.style.display = "none";
    cadastroContainer.style.display = "flex";
  });

  mostrarLogin.addEventListener("click", (e) => {
    e.preventDefault();
    cadastroContainer.style.display = "none";
    loginContainer.style.display = "flex";
  });

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("emailLogin").value;
    const senha = document.getElementById("senhaLogin").value;
    try {
      await signInWithEmailAndPassword(auth, email, senha);
      mostrarNotificacao("✅ Login realizado com sucesso!", "sucesso");
    } catch (error) {
      mostrarNotificacao("❌ Erro ao fazer login: " + error.message, "erro");
    }
  });

  document.getElementById("cadastroBtn").addEventListener("click", async () => {
    const email = document.getElementById("emailCadastro").value;
    const senha = document.getElementById("senhaCadastro").value;
    try {
      await createUserWithEmailAndPassword(auth, email, senha);
      mostrarNotificacao("🎉 Conta criada com sucesso!", "sucesso");
      setTimeout(() => {
        cadastroContainer.style.display = "none";
        loginContainer.style.display = "flex";
      }, 1000);
    } catch (error) {
      mostrarNotificacao("❌ Erro ao criar conta: " + error.message, "erro");
    }
  });

  // Mostra login depois da intro (se existir)
  setTimeout(() => {
    const intro = document.getElementById("intro");
    if (intro) {
      intro.style.opacity = "0";
      intro.style.transition = "opacity 1s";
      setTimeout(() => {
        intro.style.display = "none";
        loginContainer.style.display = "flex";
      }, 1000);
    } else {
      loginContainer.style.display = "flex";
    }
  }, 4000);
</script>
