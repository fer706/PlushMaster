
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlushMaster</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/3rZTK3HP/plush-master-logo.png">

    <style>
        /* ======= RESET E BASE ======= */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f7eadf;
        }

        /* Centralização */
        .container {
            width: 100%;
            max-width: 450px;
            margin: auto;
            padding: 20px;
        }

        button {
            width: 100%;
            max-width: 350px;
            margin: 10px auto;
            display: block;
        }

        input {
            width: 100%;
            max-width: 350px;
            padding: 12px;
            margin: 10px auto;
            display: block;
            border-radius: 8px;
            font-size: 16px;
        }

        h1,
        h2,
        h3,
        p {
            text-align: center;
            word-wrap: break-word;
        }

        /* ======= RESPONSIVIDADE ======= */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
            }

            button {
                font-size: 16px;
                padding: 12px;
            }

            input {
                font-size: 15px;
            }
        }

        @media (max-width: 768px) {
            .container {
                max-width: 500px;
            }

            button {
                font-size: 18px;
            }
        }

        /* ========= TELA 1 ========= */
        #tela1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: space-between;
            background: #f7eadf;
        }

        #tela1 .logo img {
            width: 250px;
            margin-top: 30px;
        }

        #tela1 .start-btn {
            background: linear-gradient(#0dd0ff, #0074d9);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 50px;
            width: 80%;
            max-width: 330px;
        }

        #tela1 .footer {
            margin-bottom: 20px;
            color: #333;
        }

        /* ========= TELA 2 ========= */
        #tela2 {
            display: none;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            background: #37bdf8;
        }

        #tela2 .logo {
            margin-top: 40px;
        }

        #tela2 .logo img {
            width: 240px;
        }

        #tela2 .box {
            background: #f7eadf;
            width: 85%;
            max-width: 400px;
            padding: 25px;
            margin-top: 25px;
            border-radius: 18px;
            text-align: center;
        }

        #tela2 label {
            float: left;
            margin-left: 5px;
            margin-bottom: 5px;
            font-size: 16px;
            font-weight: bold;
            color: #002b4c;
        }

        #tela2 input {
            padding: 15px;
        }

        #tela2 .btn {
            margin-top: 20px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(#0dd0ff, #0074d9);
            border: none;
            color: #fff;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
        }

        #tela2 .footer {
            margin-top: auto;
            margin-bottom: 20px;
            color: #003c5c;
            font-size: 14px;
        }

        /* ========= NOTIFICAÇÃO ========= */
        .notif {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4444;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            font-size: 15px;
            transition: opacity .4s;
        }

        .notif.show {
            opacity: 1;
        }

        /* ========= TELA 3 ========= */
        #tela3 {
            width: 100%;
            height: 100vh;
            background: #44C0FF;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .voltar {
            position: absolute;
            left: 20px;
            top: 20px;
            font-size: 35px;
            color: white;
            cursor: pointer;
        }

        #tela3 .logo img {
            width: 220px;
            margin-top: 60px;
        }

        #tela3 .box {
            background: #FFF5EB;
            width: 85%;
            max-width: 380px;
            padding: 25px;
            margin-top: 20px;
            border-radius: 18px;
            text-align: center;
        }

        #tela3 .email-text {
            font-size: 17px;
            margin-bottom: 12px;
        }

        .senha-box {
            position: relative;
        }

        .senha-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .olho {
            position: absolute;
            right: 10px;
            top: 12px;
            cursor: pointer;
            font-size: 20px;
        }

        .esq-senha {
            display: block;
            margin-top: 8px;
            text-align: left;
            font-size: 14px;
            color: #004CFF;
            cursor: pointer;
        }

        #tela3 .btn {
            width: 100%;
            margin-top: 20px;
            padding: 13px;
            border-radius: 14px;
            font-size: 18px;
            color: white;
            background: linear-gradient(to bottom, #00C6FF, #006DFF);
            border: none;
            cursor: pointer;
        }

        #tela3 .footer {
            position: absolute;
            bottom: 15px;
            color: #fff;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <!-- ========= TELA 1 ========= -->
    <div id="tela1">
        <div class="logo">
            <img src="https://i.postimg.cc/pXQ9MCLx/plush-master-logo-removebg-preview.png">
        </div>

        <button class="start-btn" onclick="abrirTela2()">Vamos começar</button>

        <div class="footer">© 2025 PlushMaster</div>
    </div>

    <!-- ========= TELA 2 ========= -->
    <div id="tela2">
        <div class="logo">
            <img src="https://i.postimg.cc/pXQ9MCLx/plush-master-logo-removebg-preview.png">
        </div>

        <div class="box">
            <h2>Entre ou cadastre-se</h2>
            <p>Informe seu e-mail para continuar</p>

            <label>E-mail</label>
            <input type="email" id="emailInput" placeholder="exemplo@email.com">

            <button class="btn" onclick="validarEmail()">Continuar</button>
        </div>

        <div class="footer">© 2025 Ababuta</div>
    </div>

    <!-- ========= NOTIFICAÇÃO ========= -->
    <div id="notif" class="notif"></div>

    <!-- ========= TELA 3 ========= -->
    <div id="tela3">
        <div class="voltar" onclick="voltarParaTela2()">&#8592;</div>

        <div class="logo">
            <img src="https://i.postimg.cc/pXQ9MCLx/plush-master-logo-removebg-preview.png">
        </div>

        <div class="box">
            <h2>É bom te ver novamente</h2>
            <p id="emailExibir" class="email-text"></p>

            <label>Senha</label>

            <div class="senha-box">
                <input type="password" id="senhaInput" placeholder="Informe a sua senha">
                <span class="olho" onclick="toggleSenha()">👁️</span>
            </div>

            <a class="esq-senha">Esqueceu a senha?</a>

            <button class="btn" onclick="entrar()">Entrar</button>
        </div>

        <div class="footer">© 2025 Ababuta</div>
    </div>

    <!-- ========= JAVASCRIPT ========= -->
    <script>
        function abrirTela2() {
            document.getElementById("tela1").style.display = "none";
            document.getElementById("tela2").style.display = "flex";
        }

        function validarEmail() {
            const email = document.getElementById("emailInput").value;
            const padrao = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (padrao.test(email)) {
                abrirTela3();
            } else {
                mostrarNotificacao("E-mail inválido! Tente novamente.");
            }
        }

        function mostrarNotificacao(texto) {
            const notif = document.getElementById("notif");
            notif.textContent = texto;
            notif.classList.add("show");

            setTimeout(() => {
                notif.classList.remove("show");
            }, 2500);
        }

        function abrirTela3() {
            document.getElementById("tela2").style.display = "none";
            document.getElementById("tela3").style.display = "flex";

            document.getElementById("emailExibir").textContent =
                document.getElementById("emailInput").value;
        }

        function voltarParaTela2() {
            document.getElementById("tela3").style.display = "none";
            document.getElementById("tela2").style.display = "flex";
        }

        function toggleSenha() {
            let campo = document.getElementById("senhaInput");
            campo.type = campo.type === "password" ? "text" : "password";
        }

        function entrar() {
            const senha = document.getElementById("senhaInput").value;

            if (senha.length < 4) {
                mostrarNotificacao("A senha deve ter pelo menos 4 caracteres.");
                return;
            }

            alert("Login OK — indo para a próxima tela!");
        }
    </script>

</body>
</html>
