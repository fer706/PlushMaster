<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PlushMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="https://i.postimg.cc/3rZTK3HP/plush-master-logo.png">

<style>
  body {
    margin: 0;
    background-color: #ffffff;
    font-family: 'Orbitron', sans-serif;
    overflow-y: auto; /* só rola se necessário */
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* INTRO */
  #intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #001F3F;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #00BFFF;
    z-index: 1000;
  }

  #intro img {
    width: 100px;
    opacity: 0;
    animation: logoZoom 4s ease-in-out forwards;
  }

  #carregando-texto {
    font-size: 1.2em;
    opacity: 0;
    margin-top: 20px;
    animation: aparecerTexto 1s ease-in-out 3s forwards;
  }

  @keyframes logoZoom {
    0% { transform: scale(0.1); opacity: 0; }
    30% { opacity: 1; }
    60% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
  }

  @keyframes aparecerTexto {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* FAIXA AZUL */
  #faixa {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 12vh; /* proporcional à tela */
    min-height: 80px;
    background-color: #007bff;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  #faixa h1 {
    color: #fff;
    font-size: 4vw;
    min-font-size: 28px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 0;
  }

  /* VÍDEO */
  #videoWrapper {
    display: none;
    width: 95%;
    max-width: 1200px;
    aspect-ratio: 16/9;
    margin: calc(12vh + 20px) auto 20px auto; /* espaço abaixo da faixa */
  }

  #videoWrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* BOTÃO ABAIXO DO VÍDEO */
  #botaoWrapper {
    display: none;
    width: 95%;
    max-width: 1200px;
    aspect-ratio: 16/3; /* proporcional ao botão */
    margin: 20px auto 40px auto;
    position: relative;
    text-align: center;
  }

  #botaoWrapper a {
    display: inline-block;
    max-width: 300px;
    max-height: 80px;
    width: 20%;
    height: 50%;
    background-image: url('https://i.postimg.cc/X7F1gJP3/Imagem-do-Whats-App-de-2025-11-08-a-s-21-46-36-94159710.jpg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    text-decoration: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <img src="https://i.postimg.cc/3rZTK3HP/plush-master-logo.png" alt="Logo do Site">
  <div id="carregando-texto">Carregando...</div>
</div>

<!-- FAIXA AZUL -->
<div id="faixa">
  <h1>PLUSHMASTER</h1>
</div>

<!-- VÍDEO LIVE -->
<div id="videoWrapper">
  <iframe src="https://delaysp01.logicahost.com.br:5443/onlinemachine/play.html?name=onlinemachine" allowfullscreen></iframe>
</div>

<!-- BOTÃO ABAIXO DO VÍDEO -->
<div id="botaoWrapper">
  <a href="#" target="_blank"></a>
</div>

<script>
  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("faixa").style.display = "flex";
    document.getElementById("videoWrapper").style.display = "block";
    document.getElementById("botaoWrapper").style.display = "block";
  }, 4000);
</script>

</body>
</html>
