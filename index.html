<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Plush Master</title>

<!-- 🔔 Container das notificações -->
<div id="notificacaoContainer"></div>

<style>
  /* Container das notificações */
  #notificacaoContainer {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 9999;
  }

  .notificacao {
    background: rgba(0, 0, 0, 0.9);
    border: 2px solid #ff0000;
    box-shadow: 0 0 20px #ff0000;
    color: #ff5555;
    font-family: "Orbitron", sans-serif;
    font-size: 14px;
    padding: 12px 18px;
    border-radius: 12px;
    animation: aparecer 0.4s ease, desaparecer 0.5s ease 3.5s forwards;
    backdrop-filter: blur(4px);
  }

  @keyframes aparecer {
    from { opacity:0; transform: translateX(50px);}
    to { opacity:1; transform: translateX(0);}
  }
  @keyframes desaparecer {
    to { opacity:0; transform: translateX(50px);}
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:black; }

  .tela {
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 0.5s ease;
  }

  /* Telas */
  #tela1 {
    background-image: url('https://i.postimg.cc/qqmMFMZm/IMG-1599.jpg');
    z-index: 2;
    display: block;
  }
  #tela2 {
    background-image: url('https://i.postimg.cc/4x6j4FsD/IMG-1600.jpg');
    display: none;
    z-index: 3;
  }
  #tela3 {
    background-image: url('https://i.postimg.cc/gkPmd7hY/IMG-1601.jpg');
    display: none;
    z-index: 4;
  }

  /* Botões invisíveis */
button {
  position: absolute;
  background: transparent;
  border: none;
  cursor: pointer;
}

/* Botão da primeira tela */
#botaoComecar {
  top: 50%;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 10%;
}

/* Campos de e-mail e senha */
#emailInput, #senhaInput {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  border-radius: 10px;
  padding-left: 10px;
  border: none;
  font-size: 1rem;
}

#emailInput { top: 46%; height: 5%; }   /* campo de e-mail */
#senhaInput { top: 56%; height: 5%; }   /* campo de senha */

/* Botões invisíveis da segunda e terceira tela */
#botaoVerificar {
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 7%;
  top: 54%;  /* logo abaixo do campo de e-mail */
}

#botaoSenha {
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 7%;
  top: 65%;  /* logo abaixo do campo de senha */
}

</style>
</head>
<body>

<!-- Primeira tela -->
<div id="tela1" class="tela">
  <button id="botaoComecar"></button>
</div>

<!-- Segunda tela -->
<div id="tela2" class="tela">
  <input type="email" id="emailInput" placeholder="Digite seu e-mail" />
  <button id="botaoVerificar"></button>
</div>

<!-- Terceira tela -->
<div id="tela3" class="tela">
  <input type="password" id="senhaInput" placeholder="Digite sua senha" />
  <button id="botaoSenha"></button>
</div>

<script>
  const tela1 = document.getElementById("tela1");
  const tela2 = document.getElementById("tela2");
  const tela3 = document.getElementById("tela3");
  const botaoComecar = document.getElementById("botaoComecar");
  const botaoVerificar = document.getElementById("botaoVerificar");
  const botaoSenha = document.getElementById("botaoSenha");
  const emailInput = document.getElementById("emailInput");
  const senhaInput = document.getElementById("senhaInput");

  function mostrarNotificacao(texto){
    const container = document.getElementById("notificacaoContainer");
    const notif = document.createElement("div");
    notif.className = "notificacao";
    notif.textContent = texto;
    container.appendChild(notif);
    setTimeout(()=>{ notif.remove(); },4000);
  }

  // Tela 1 → Tela 2
  botaoComecar.addEventListener("click", ()=>{
    tela1.style.opacity="0";
    setTimeout(()=>{
      tela1.style.display="none";
      tela2.style.display="block";
      tela2.style.opacity="1";
    },500);
  });

  // Tela 2 → Tela 3
  botaoVerificar.addEventListener("click", ()=>{
    const email = emailInput.value.trim();
    if(email===""){
      mostrarNotificacao("Digite seu e-mail antes de continuar!");
    } else {
      mostrarNotificacao("E-mail verificado com sucesso!");
      tela2.style.display="none";
      tela3.style.display="block";
      tela3.style.opacity="1";
      console.log("Email do usuário:", email);
    }
  });

  // Tela 3 → Ação final (exemplo)
  botaoSenha.addEventListener("click", ()=>{
    const senha = senhaInput.value.trim();
    if(senha===""){
      mostrarNotificacao("Digite sua senha antes de continuar!");
    } else {
      mostrarNotificacao("Login efetuado com sucesso!");
      console.log("Senha do usuário:", senha);
      // Aqui você pode redirecionar ou abrir a próxima tela
    }
  });
</script>

</body>
</html>
