<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlushMaster/cadastro</title>

 <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/pXQ9MCLx/plush-master-logo-removebg-preview.png">


<style>
    * { box-sizing: border-box; }

    /* === ANIMAÇÃO DE TROCA DE TELA === */
    .tela {
        animation: aparecerTela .4s ease;
    }

    @keyframes aparecerTela {
        from { opacity: 0; transform: translateX(40px); }
        to { opacity: 1; transform: translateX(0); }
    }

    .saindo {
        animation: sairTela .35s ease forwards;
    }

    @keyframes sairTela {
        from { opacity: 1; transform: translateX(0); }
        to { opacity: 0; transform: translateX(-40px); }
    }

    body {
        margin: 0;
        padding: 0;
        background: #3dc8ff;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    .logo {
        width: 250px;
        margin-top: 30px;
  }
    
  .card {
        background: #f7e9dd;
        width: 90%;
        max-width: 400px;
        margin: 30px auto;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }


    h2 {
        margin-bottom: 10px;
        font-size: 24px;
        color: #000;
    }

    label {
        display: block;
        text-align: left;
        width: 85%;
        margin: 0 auto 5px auto;
        color: #000;
        font-weight: bold;
    }

    input {
        width: 75%;
        padding: 12px;
        border-radius: 10px;
        border: 2px solid #000;
        font-size: 16px;
        outline: none;
        margin-bottom: 15px;
    }

    .btn {
        width: 85%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(180deg, #4db8ff, #0077e6);
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }

    footer {
        margin-top: 25px;
        font-size: 14px;
        color: #004c73;
    }

    #notificacoes {
        position: fixed;
        top: 15px;
        right: 15px;
        width: 260px;
        z-index: 999999;
    }

    .notif {
        background: rgba(0,0,0,0.7);
        border-left: 4px solid #00eaff;
        padding: 12px;
        color: #fff;
        font-size: 15px;
        margin-top: 10px;
        border-radius: 8px;
        animation: aparecer .4s ease;
    }

    @keyframes aparecer {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
    }
</style>
</head>

<body>

<div class="tela" id="conteudo">

<div id="notificacoes"></div>

<img class="logo" src="https://i.postimg.cc/pXQ9MCLx/plush-master-logo-removebg-preview.png">

<div class="card">
    <h2>Crie sua senha</h2>

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha">

    <label>Confirmar senha</label>
    <input type="password" id="confirmSenha" placeholder="Confirme sua senha">

    <button class="btn" onclick="criarSenha()">Cadastrar</button>
</div>

<footer>© 2025 PlushMaster</footer>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyApQ9KvXtv4_negpU9wHlajGeOuZ1FSKBA",
        authDomain: "plush-master.firebaseapp.com",
        projectId: "plush-master",
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    /* === FUNÇÃO PARA FAZER A ANIMAÇÃO DE TROCA === */
    function irPara(pagina) {
        const tela = document.getElementById("conteudo");
        tela.classList.add("saindo");

        setTimeout(() => {
            window.location.href = pagina;
        }, 300);
    }

    function notificar(msg) {
        const div = document.createElement("div");
        div.className = "notif";
        div.innerText = msg;
        document.getElementById("notificacoes").appendChild(div);

        setTimeout(() => {
            div.style.opacity = "0";
            div.style.transform = "translateX(20px)";
            setTimeout(() => div.remove(), 300);
        }, 3500);
    }

    const email = localStorage.getItem("emailCadastro");

    if (!email) {
        notificar("Nenhum e-mail encontrado. Volte para a tela de cadastro.");
    }

    function criarSenha() {
        const senha = document.getElementById("senha").value.trim();
        const confirmSenha = document.getElementById("confirmSenha").value.trim();

        if (!senha || !confirmSenha) {
            notificar("Preencha todos os campos!");
            return;
        }

        if (senha !== confirmSenha) {
            notificar("As senhas não coincidem!");
            return;
        }

        auth.createUserWithEmailAndPassword(email, senha)
            .then(() => {
                notificar("Conta criada com sucesso!");
                
                /* 👉 AGORA SAI COM ANIMAÇÃO */
                irPara("painel.html");
            })
            .catch((error) => {
                if (error.code === "auth/email-already-in-use") {
                    notificar("Este e-mail já está cadastrado. Faça login.");
                } else {
                    notificar(error.message);
                }
            });
    }
</script>

</body>
</html>
