<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlushMaster - Entrar</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #3dc8ff; /* azul claro igual ao seu */
        font-family: Arial, sans-serif;
        text-align: center;
    }

    .logo {
        width: 180px;
        margin-top: 40px;
    }

    .card {
        background: #f7e9dd; /* bege igual ao seu */
        width: 90%;
        max-width: 380px;
        margin: 40px auto;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    h2 {
        margin-bottom: 10px;
        font-size: 24px;
        color: #000;
    }

    p {
        margin-top: 0;
        margin-bottom: 25px;
        color: #555;
        font-size: 15px;
    }

    .btn {
        width: 100%;
        padding: 14px;
        margin-top: 15px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(180deg, #4db8ff, #0077e6); /* igual ao botão "Continuar" */
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn:hover {
        opacity: 0.9;
    }

    footer {
        margin-top: 30px;
        font-size: 14px;
        color: #004c73;
    }
</style>
</head>

<body>

<img class="logo" src="https://i.postimg.cc/pXQ9MCLx/plush-master-logo-removebg-preview.png">

<div class="card">
    <h2>Entre ou cadastre-se</h2>
    <p>Escolha uma opção para continuar</p>

    <button class="btn" onclick="location.href='email.html'">Login</button>
    <button class="btn" onclick="location.href='emailcadastro.html'">Cadastro</button>
</div>

<footer>© 2025 PlushMaster</footer>

</body>
</html>
